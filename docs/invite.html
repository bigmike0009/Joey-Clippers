<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Join Joe's Clippers</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(160deg, #FFF8F0 0%, #FDECD0 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: rgba(255, 255, 255, 0.92);
      border-radius: 24px;
      padding: 40px 28px 32px;
      max-width: 380px;
      width: 100%;
      box-shadow: 0 12px 40px rgba(44, 24, 16, 0.14);
      text-align: center;
    }
    .icon { font-size: 52px; margin-bottom: 18px; }
    h1 { font-size: 26px; font-weight: 700; color: #2C1810; margin-bottom: 8px; }
    .subtitle { font-size: 15px; color: #78716C; line-height: 1.55; margin-bottom: 32px; }
    .btn {
      display: block; width: 100%; padding: 16px; border-radius: 14px;
      font-size: 16px; font-weight: 600; text-decoration: none;
      text-align: center; margin-bottom: 12px; cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-primary { background: #D97706; color: #fff; }
    .btn-primary:active { background: #B45309; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">✂️</div>
    <h1>You're invited!</h1>
    <p class="subtitle">
      Joe's Clippers is a private booking app for Joe's barbershop.
      Download the app to get started.
    </p>

    <a class="btn btn-primary" href="https://apps.apple.com/us/app/joes-snip-shack/id6764616090">
      Download on the App Store
    </a>
  </div>
</body>
</html>
